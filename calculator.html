<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #display {
      width: 100%;
      height: 50px;
      margin-bottom: 15px;
      font-size: 22px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }

    button {
      height: 60px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
    }

    /* Number buttons */
    .num {
      background-color: #444;
    }

    /* Operator buttons */
    .operator {
      background-color: orange;
    }

    /* Equal button */
    .equal {
      background-color: green;
      grid-column: span 2;
    }

    /* Clear button */
    .clear {
      background-color: red;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator" onclick="press('/')">/</button>
    <button class="operator" onclick="press('*')">*</button>
    <button class="operator" onclick="press('-')">-</button>

    <button class="num" onclick="press('7')">7</button>
    <button class="num" onclick="press('8')">8</button>
    <button class="num" onclick="press('9')">9</button>
    <button class="operator" onclick="press('+')">+</button>

    <button class="num" onclick="press('4')">4</button>
    <button class="num" onclick="press('5')">5</button>
    <button class="num" onclick="press('6')">6</button>

    <button class="num" onclick="press('1')">1</button>
    <button class="num" onclick="press('2')">2</button>
    <button class="num" onclick="press('3')">3</button>

    <button class="num" onclick="press('0')">0</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
function press(value) {
  document.getElementById("display").value += value;
}

function calculate() {
  try {
    document.getElementById("display").value =
      eval(document.getElementById("display").value);
  } catch {
    alert("Invalid input");
  }
}

function clearDisplay() {
  document.getElementById("display").value = "";
}
</script>

</body>
</html>
